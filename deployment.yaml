apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-nginx

  template:
    metadata:
      labels:
        app: flask-nginx

    spec:
      containers:
      - name: flask-nginx
        image: dockerhub_username/flask-nginx-app:latest
        ports:
        - containerPort: 80